server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: trading-system
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-logs
          component: trading-system
          __path__: /var/log/app/trading-system-*.log

  - job_name: market-data-sync
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-logs
          component: market-data-sync
          __path__: /var/log/app/market-data-sync-*.log

  - job_name: risk-management
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-logs
          component: risk-management
          __path__: /var/log/app/risk-management-*.log

  - job_name: settlement-processing
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-logs
          component: settlement-processing
          __path__: /var/log/app/settlement-processing-*.log

  - job_name: error-scenarios
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-logs
          component: error-scenarios
          __path__: /var/log/app/error-scenarios-*.log
