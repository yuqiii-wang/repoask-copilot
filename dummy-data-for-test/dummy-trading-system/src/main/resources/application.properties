# Server configuration
server.port=8080
server.servlet.context-path=/trading-system

# Spring Security configuration
spring.security.user.name=user
spring.security.user.password=password

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:tradingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Kafka configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=trading-group

# RabbitMQ configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Actuator configuration
management.endpoints.web.exposure.include=*

# Feign client configuration
feign.client.market-data.url=http://localhost:9090
feign.client.settlement-gateway.url=http://localhost:9091

# Spring Cloud 2025.0.0 (4.3.0) / Spring Boot 4.0 compatibility workaround:
# Spring Cloud 4.3.0 auto-configurations still reference Spring Boot 3.x class names
# (org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration,
#  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,
#  org.springframework.boot.autoconfigure.web.ServerProperties, …) that were
# relocated in Spring Boot 4.0's modular auto-configuration structure.
# This application uses Feign clients with explicit URLs and needs none of the
# Spring Cloud context-refresh, service-discovery, or load-balancing subsystems.
# Excluding all problematic auto-configurations restores compatibility.
spring.autoconfigure.exclude=\
  org.springframework.cloud.autoconfigure.ConfigurationPropertiesRebinderAutoConfiguration,\
  org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration,\
  org.springframework.cloud.autoconfigure.RefreshAutoConfiguration,\
  org.springframework.cloud.autoconfigure.RefreshEndpointAutoConfiguration,\
  org.springframework.cloud.autoconfigure.WritableEnvironmentEndpointAutoConfiguration,\
  org.springframework.cloud.client.CommonsClientAutoConfiguration,\
  org.springframework.cloud.client.ReactiveCommonsClientAutoConfiguration,\
  org.springframework.cloud.client.discovery.composite.CompositeDiscoveryClientAutoConfiguration,\
  org.springframework.cloud.client.discovery.composite.reactive.ReactiveCompositeDiscoveryClientAutoConfiguration,\
  org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration,\
  org.springframework.cloud.client.discovery.simple.reactive.SimpleReactiveDiscoveryClientAutoConfiguration,\
  org.springframework.cloud.client.hypermedia.CloudHypermediaAutoConfiguration,\
  org.springframework.cloud.client.loadbalancer.LoadBalancerAutoConfiguration,\
  org.springframework.cloud.client.loadbalancer.LoadBalancerDefaultMappingsProviderAutoConfiguration,\
  org.springframework.cloud.client.loadbalancer.reactive.LoadBalancerBeanPostProcessorAutoConfiguration,\
  org.springframework.cloud.client.loadbalancer.reactive.ReactorLoadBalancerClientAutoConfiguration,\
  org.springframework.cloud.client.serviceregistry.ServiceRegistryAutoConfiguration,\
  org.springframework.cloud.commons.util.UtilAutoConfiguration,\
  org.springframework.cloud.configuration.CompatibilityVerifierAutoConfiguration,\
  org.springframework.cloud.client.serviceregistry.AutoServiceRegistrationAutoConfiguration,\
  org.springframework.cloud.commons.security.ResourceServerTokenRelayAutoConfiguration,\
  org.springframework.cloud.commons.config.CommonsConfigAutoConfiguration,\
  org.springframework.cloud.openfeign.hateoas.FeignHalAutoConfiguration,\
  org.springframework.cloud.openfeign.FeignAutoConfiguration,\
  org.springframework.cloud.openfeign.encoding.FeignAcceptGzipEncodingAutoConfiguration,\
  org.springframework.cloud.openfeign.encoding.FeignContentGzipEncodingAutoConfiguration,\
  org.springframework.cloud.openfeign.loadbalancer.FeignLoadBalancerAutoConfiguration