# ── Chaos Engineering Profile ──────────────────────────────────────────────────
# Activate with: --spring.profiles.active=chaos
# or set env var: SPRING_PROFILES_ACTIVE=chaos
#
# When active, ChaosEngineFaultInjectionService injects transient faults on
# odd-numbered calls to each guarded operation, then allows the retry through.

# Shorten retry back-off so chaos tests run quickly
chaos.retry.initial-delay-ms=200
chaos.retry.max-attempts=2

# Suppress connection-refused noise from dummy external services in chaos mode
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# Verbose logging for chaos scenarios
logging.level.com.security.trading.chaos=DEBUG
logging.level.com.security.trading.service=DEBUG
