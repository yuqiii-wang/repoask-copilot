<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="__CSS_URI__">
    <title>repoaskDocuments</title>
</head>
<body>
    <main class="container">
        __DOC_STORE_HTML__
        <div id="main-splitter" class="main-splitter" role="separator" aria-orientation="horizontal" aria-label="Resize list and detail"></div>
        <section class="viewer">
            <section class="content-pane">
                <div class="viewer-header">
                    <h2 class="viewer-title">Content</h2>
                    <button id="add-to-prompts-btn" class="action-btn" type="button" disabled>Add to Prompts</button>
                </div>
                <div id="doc-content" class="doc-content">Select a document to view local content.</div>
            </section>
            <div id="viewer-splitter" class="viewer-splitter" role="separator" aria-orientation="horizontal" aria-label="Resize content and metadata"></div>
            __METADATA_HTML__
        </section>
        __FEEDBACK_HTML__
    </main>

    <script>
        const vscode = acquireVsCodeApi();
        const docs = __DOCS_DATA__;
        
        const docContentEl = document.getElementById('doc-content');
        const addToPromptsBtnEl = document.getElementById('add-to-prompts-btn');
        const containerEl = document.querySelector('.container');
        const headerEl = document.querySelector('.header');
        const mainSplitterEl = document.getElementById('main-splitter');
        const viewerEl = document.querySelector('.viewer');
        const viewerSplitterEl = document.getElementById('viewer-splitter');
        
        let displayedDocs = Array.isArray(docs) ? docs.map(doc => ({ id: doc.id, title: doc.title, last_updated: doc.last_updated || '' })) : [];
        let selectedDocId = null;

        let isViewerResizing = false;
        let isMainResizing = false;
        let mainTopPaneRatio = 0.4;
        let topPaneRatio = 0.6;
        const layoutGap = 10;
        const layoutSplitterHeight = 6;

        function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }

        function applyMainTopHeight(topHeightPx) {
            if (!containerEl || !headerEl) return;
            const containerHeight = containerEl.clientHeight || 0;
            const headerHeight = headerEl.offsetHeight || 0;
            const totalResizableHeight = Math.max(0, containerHeight - headerHeight - (layoutGap * 3) - layoutSplitterHeight);
            const minTop = Math.floor(totalResizableHeight * 0.3);
            const maxTop = Math.ceil(totalResizableHeight * 0.7);
            const safeTop = clamp(topHeightPx, minTop, maxTop);
            const bottomHeight = Math.max(0, totalResizableHeight - safeTop);
            mainTopPaneRatio = totalResizableHeight > 0 ? (safeTop / totalResizableHeight) : 0.4;
            containerEl.style.gridTemplateRows = `auto ${safeTop}px ${layoutSplitterHeight}px ${bottomHeight}px`;
        }

        function onMainSplitterPointerMove(event) {
            if (!isMainResizing || !headerEl) return;
            const headerRect = headerEl.getBoundingClientRect();
            const topHeight = event.clientY - headerRect.bottom - layoutGap;
            applyMainTopHeight(topHeight);
        }

        function stopMainSplitterResize() {
            if (!isMainResizing) return;
            isMainResizing = false;
            document.body.classList.remove('is-resizing');
            window.removeEventListener('pointermove', onMainSplitterPointerMove);
            window.removeEventListener('pointerup', stopMainSplitterResize);
        }

        function applyViewerTopHeight(topHeightPx) {
            if (!viewerEl) return;
            const viewerHeight = viewerEl.clientHeight || 0;
            const totalResizableHeight = Math.max(0, viewerHeight - layoutSplitterHeight);
            const minTop = Math.floor(totalResizableHeight * 0.3);
            const maxTop = Math.ceil(totalResizableHeight * 0.7);
            const safeTop = clamp(topHeightPx, minTop, maxTop);
            const bottomHeight = Math.max(0, totalResizableHeight - safeTop);
            topPaneRatio = totalResizableHeight > 0 ? (safeTop / totalResizableHeight) : 0.6;
            viewerEl.style.gridTemplateRows = `${safeTop}px ${layoutSplitterHeight}px ${bottomHeight}px`;
        }

        function onSplitterPointerMove(event) {
            if (!isViewerResizing || !viewerEl) return;
            const rect = viewerEl.getBoundingClientRect();
            const topHeight = event.clientY - rect.top;
            applyViewerTopHeight(topHeight);
        }

        function stopSplitterResize() {
            if (!isViewerResizing) return;
            isViewerResizing = false;
            document.body.classList.remove('is-resizing');
            window.removeEventListener('pointermove', onSplitterPointerMove);
            window.removeEventListener('pointerup', stopSplitterResize);
        }

        mainSplitterEl.addEventListener('pointerdown', (event) => {
            isMainResizing = true;
            document.body.classList.add('is-resizing');
            mainSplitterEl.setPointerCapture(event.pointerId);
            window.addEventListener('pointermove', onMainSplitterPointerMove);
            window.addEventListener('pointerup', stopMainSplitterResize);
        });

        viewerSplitterEl.addEventListener('pointerdown', (event) => {
            isViewerResizing = true;
            document.body.classList.add('is-resizing');
            viewerSplitterEl.setPointerCapture(event.pointerId);
            window.addEventListener('pointermove', onSplitterPointerMove);
            window.addEventListener('pointerup', stopSplitterResize);
        });

        function escapeHtml(value) {
            return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        addToPromptsBtnEl.addEventListener('click', () => {
            if (!selectedDocId) return;
            vscode.postMessage({ command: 'addToPrompts', docId: selectedDocId });
        });

        const openRefreshPopupBtn = document.getElementById('open-refresh-popup-btn');
        const refreshPopup = document.getElementById('refresh-popup');
        const closeRefreshPopupBtn = document.getElementById('close-refresh-popup-btn');
        const submitRefreshBtn = document.getElementById('submit-refresh-btn');
        const syncSingleInput = document.getElementById('sync-single-input');
        const syncSingleContainer = document.getElementById('sync-single-container');
        const syncAllContainer = document.getElementById('sync-all-container');
        const syncResetContainer = document.getElementById('sync-reset-container');
        const syncRadios = document.querySelectorAll('input[name="syncType"]');

        if (openRefreshPopupBtn && refreshPopup) {
            openRefreshPopupBtn.addEventListener('click', () => {
                refreshPopup.style.display = 'block';
                if (syncSingleInput && syncSingleInput.offsetParent !== null) syncSingleInput.focus();
            });
            closeRefreshPopupBtn.addEventListener('click', () => {
                refreshPopup.style.display = 'none';
            });
            syncRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.value === 'all') {
                        if (syncSingleContainer) syncSingleContainer.style.display = 'none';
                        if (syncAllContainer) syncAllContainer.style.display = 'block';
                        if (syncResetContainer) syncResetContainer.style.display = 'none';
                    } else if (e.target.value === 'reset') {
                        if (syncSingleContainer) syncSingleContainer.style.display = 'none';
                        if (syncAllContainer) syncAllContainer.style.display = 'none';
                        if (syncResetContainer) syncResetContainer.style.display = 'block';
                    } else {
                        if (syncSingleContainer) syncSingleContainer.style.display = 'block';
                        if (syncAllContainer) syncAllContainer.style.display = 'none';
                        if (syncResetContainer) syncResetContainer.style.display = 'none';
                        if (syncSingleInput) syncSingleInput.focus();
                    }
                });
            });
            submitRefreshBtn.addEventListener('click', () => {
                // Disable button and show spinner
                submitRefreshBtn.disabled = true;
                submitRefreshBtn.innerHTML = '<div class="spinner"></div>';
                
                let isAll = false;
                let isReset = false;
                const allRadio = document.querySelector('input[name="syncType"][value="all"]');
                const resetRadio = document.querySelector('input[name="syncType"][value="reset"]');
                if (allRadio && allRadio.checked) isAll = true;
                if (resetRadio && resetRadio.checked) isReset = true;
                if (isReset) {
                    if(typeof renderSyncError === 'function') renderSyncError('');
                    if(typeof renderSuccessMessage === 'function') renderSuccessMessage('');
                    if(typeof renderSyncStatus === 'function') renderSyncStatus('resetting to default documents...');
                    vscode.postMessage({ command: 'resetToDefaultDocs' });
                } else if (isAll) {
                    if(typeof renderSyncError === 'function') renderSyncError('');
                    if(typeof renderSuccessMessage === 'function') renderSuccessMessage('');
                    if(typeof renderSyncStatus === 'function') renderSyncStatus('downloading from confluence/jira cloud ...');
                    const syncAllInput = document.getElementById('sync-all-input');
                    vscode.postMessage({ command: 'refreshDocs', isAll: true, arg: syncAllInput ? syncAllInput.value.trim() : '' });
                } else {
                    const arg = syncSingleInput ? syncSingleInput.value.trim() : '';
                    if (!arg) {
                        if(typeof renderSyncError === 'function') renderSyncError('Please provide a valid URL or ID');
                        // Re-enable button if input is invalid
                        submitRefreshBtn.disabled = false;
                        submitRefreshBtn.innerHTML = 'Sync';
                        return;
                    }
                    if(typeof renderSyncError === 'function') renderSyncError('');
                    if(typeof renderSuccessMessage === 'function') renderSuccessMessage('');
                    if(typeof renderSyncStatus === 'function') renderSyncStatus(`downloading from source ...`);
                    vscode.postMessage({ command: 'refreshDocs', isAll: false, arg });
                }
                refreshPopup.style.display = 'none';
            });
        }
        
    </script>
    <script src="__DOC_STORE_JS_URI__"></script>
    <script src="__METADATA_JS_URI__"></script>
    <script src="__FEEDBACK_JS_URI__"></script>
    <script>
        // Init
        const initialSyncStatus = __SYNC_STATUS__;
        const initialSyncError = __SYNC_ERROR__;
        const initialSyncSuccess = __SYNC_SUCCESS__;
        if(typeof renderSyncStatus === 'function') renderSyncStatus(initialSyncStatus);
        if(typeof renderSyncError === 'function') renderSyncError(initialSyncError);
        if(typeof renderSuccessMessage === 'function') renderSuccessMessage(initialSyncSuccess);
        
        // Initialize feedback form
        if(typeof initFeedbackForm === 'function') initFeedbackForm();
        
        // Handle messages from extension
        window.addEventListener('message', (event) => {
            const message = event.data;
            if (message?.command === 'populateSummary' && message.summary) {
                if(typeof populateSummary === 'function') populateSummary(message.summary);
            }
            
            // Handle sync completion messages
            if (message?.command === 'syncStatus' || message?.command === 'syncError' || message?.command === 'syncSuccess') {
                const submitRefreshBtn = document.getElementById('submit-refresh-btn');
                if (submitRefreshBtn) {
                    // Keep button disabled after sync
                    submitRefreshBtn.disabled = true;
                    submitRefreshBtn.innerHTML = 'Sync';
                }
            }
        });
        
        // Wait briefly for elements to be fully registered just in case, then render
        setTimeout(() => {
            if(typeof sortDisplayedDocs === 'function') sortDisplayedDocs();
            if(typeof render === 'function') render();
        }, 0);
    </script>
</body>
</html>
