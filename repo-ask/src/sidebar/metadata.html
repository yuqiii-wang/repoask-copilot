<section class="metadata-pane">
                <div class="viewer-header">
                    <h2 class="viewer-title">Metadata</h2>
                    <div class="metadata-actions">
                        <button id="collapse-all-metadata-btn" class="metadata-section-btn" type="button" title="Collapse all">&#9660;</button>
                    </div>
                </div>
                <div class="metadata-field-group" id="field-group-type">
                    <div class="metadata-field-header">
                        <label class="metadata-label" for="type-input">Type</label>
                        <div class="metadata-field-actions">
                            <button class="field-cancel-btn action-btn action-btn-sm" type="button" style="display:none">Cancel</button>
                            <button class="field-save-btn action-btn action-btn-sm" type="button" style="display:none">Save</button>
                            <button class="metadata-section-btn" type="button" title="Collapse">&#9660;</button>
                        </div>
                    </div>
                    <select id="type-input" class="metadata-select">
                        <option value="confluence">Confluence</option>
                        <option value="jira">Jira</option>
                        <option value="skill">Skill</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="metadata-field-group" id="field-group-summary">
                    <div class="metadata-field-header">
                        <label class="metadata-label" for="summary-input">Summary</label>
                        <div class="metadata-field-actions">
                            <button id="generate-summary-btn" class="action-btn action-btn-sm" type="button" disabled>AI Gen</button>
                            <button class="field-cancel-btn action-btn action-btn-sm" type="button" style="display:none">Cancel</button>
                            <button class="field-save-btn action-btn action-btn-sm" type="button" style="display:none">Save</button>
                            <button class="metadata-section-btn" type="button" title="Collapse">&#9660;</button>
                        </div>
                    </div>
                    <textarea id="summary-input" class="metadata-textarea" rows="3" placeholder="Summary is empty. Generate or edit it." readonly></textarea>
                </div>
                <div class="metadata-field-group" id="field-group-tags">
                    <div class="metadata-field-header">
                        <label class="metadata-label" for="tags-input">Tags (comma separated)</label>
                        <div class="metadata-field-actions">
                            <button class="field-cancel-btn action-btn action-btn-sm" type="button" style="display:none">Cancel</button>
                            <button class="field-save-btn action-btn action-btn-sm" type="button" style="display:none">Save</button>
                            <button class="metadata-section-btn" type="button" title="Collapse">&#9660;</button>
                        </div>
                    </div>
                    <textarea id="tags-input" class="metadata-textarea metadata-textarea-keywords" rows="2" placeholder="tag-a, tag-b" readonly></textarea>
                </div>
                <div class="metadata-field-group" id="field-group-refqueries">
                    <div class="metadata-field-header">
                        <label class="metadata-label">Referenced Queries</label>
                        <div class="metadata-field-actions">
                            <button id="add-query-btn" class="action-btn action-btn-sm" type="button" style="display:none" title="Add query">+</button>
                            <button class="field-cancel-btn action-btn action-btn-sm" type="button" style="display:none">Cancel</button>
                            <button class="field-save-btn action-btn action-btn-sm" type="button" style="display:none">Save</button>
                            <button class="metadata-section-btn" type="button" title="Collapse">&#9660;</button>
                        </div>
                    </div>
                    <ul id="referenced-queries-list" class="referenced-queries-list">
                        <li class="referenced-query-empty">No referenced queries</li>
                    </ul>
                </div>
                <div class="metadata-field-group">
                    <div class="metadata-field-header">
                        <label class="metadata-label">Related Pages</label>
                        <button class="metadata-section-btn" type="button" title="Collapse">&#9660;</button>
                    </div>
                    <ul id="related-pages-list" class="referenced-queries-list">
                        <li class="referenced-query-empty">No related pages</li>
                    </ul>
                </div>
                <div class="metadata-field-group">
                    <div class="metadata-field-header">
                        <label class="metadata-label" for="knowledge-graph-input">Knowledge Graph (Mermaid)</label>
                        <div class="metadata-field-actions">
                            <button id="generate-kg-btn" class="action-btn action-btn-sm" type="button" disabled>AI Gen</button>
                            <button class="metadata-section-btn" type="button" title="Collapse">&#9660;</button>
                        </div>
                    </div>
                    <textarea id="knowledge-graph-input" class="metadata-textarea" rows="6" placeholder="No knowledge graph generated yet." disabled></textarea>
                </div>
                <div class="metadata-field-group">
                    <div class="metadata-field-header">
                        <label class="metadata-label">Details</label>
                        <button class="metadata-section-btn" type="button" title="Collapse">&#9660;</button>
                    </div>
                    <ul id="metadata-list" class="metadata-list">
                        <li class="metadata-item">title: -</li>
                    </ul>
                </div>
            </section>
