<section id="feedback-section" class="feedback-section" style="display: none;">
    <div class="feedback-header">
        <h2 class="feedback-title">Submit Feedback</h2>
    </div>
    <div class="feedback-form">
        <div class="form-group">
            <label for="source-query">Source Query</label>
            <input type="text" id="source-query" class="form-input" placeholder="Enter the source query">
        </div>
        <div class="form-group">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label for="conversation-summary">Conversation Content/Summary</label>
                <button id="feedback-generate-summary-btn" class="action-btn">AI Gen</button>
            </div>
            <textarea id="conversation-summary" class="form-textarea" placeholder="Enter a summary of the conversation"></textarea>
        </div>
        <div class="form-group">
            <label for="confluence-link">Confluence Page/Jira Link</label>
            <input type="text" id="confluence-link" class="form-input" placeholder="Enter the relevant link">
        </div>
        <div class="form-group">
            <label for="confluence-page-id">Confluence Page ID</label>
            <input type="text" id="confluence-page-id" class="form-input" placeholder="Enter Confluence page ID">
        </div>
        <div class="form-group">
            <label for="jira-id">Jira ID</label>
            <input type="text" id="jira-id" class="form-input" placeholder="Enter Jira issue ID">
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-input" placeholder="Enter username" value="Anonymous">
        </div>
        <div class="form-group">
            <label for="elapsed-time">Elapsed Time (s)</label>
            <input type="number" id="elapsed-time" class="form-input" placeholder="Elapsed Time">
        </div>
        <div class="form-group">
            <label for="datetime">Datetime</label>
            <input type="datetime-local" id="datetime" class="form-input">
        </div>
        <div class="form-group">
            <label for="tags">Tags</label>
            <input type="text" id="tags" class="form-input" placeholder="Enter comma-separated tags">
        </div>
        <div class="form-group">
            <label for="secondary-urls">Secondary URLs/IDs</label>
            <div id="secondary-urls-container">
                <div class="secondary-url-item">
                    <input type="text" class="form-input secondary-url-input" placeholder="Enter secondary URL or ID">
                    <button type="button" class="remove-secondary-url-btn">Remove</button>
                </div>
            </div>
            <button type="button" id="add-secondary-url-btn" class="action-btn">Add Secondary URL/ID</button>
        </div>
        <div class="form-group">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label for="knowledge-graph-raw">Knowledge Graph (Mermaid)</label>
                <button id="feedback-generate-kg-btn" class="action-btn" type="button">AI Gen</button>
            </div>
            <textarea id="knowledge-graph-raw" class="form-textarea" rows="6" placeholder="No knowledge graph yet. Click 'AI Gen' to build." readonly></textarea>
        </div>
        <div class="form-actions">
            <button id="submit-feedback-btn" class="action-btn primary">Submit</button>
            <button id="cancel-feedback-btn" class="action-btn">Cancel</button>
        </div>
    </div>
</section>
